<form id="contactForm">
  <h2>Tell us about your business</h2>

  <!-- NAME ROW -->
  <div class="form-row">
    <div class="form-group">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" required>
    </div>

    <div class="form-group">
      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname">
    </div>
  </div>

  <!-- EMAIL -->
  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>
  </div>

  <!-- BUSINESS -->
  <div class="form-group">
    <label for="business">Business Name</label>
    <input type="text" id="business" name="business">
  </div>

  <!-- INDUSTRY -->
  <div class="form-group">
    <label for="industry">Select your industry</label>
    <select id="industry" name="industry" required>
      <option value="">Choose one...</option>
      <option>Trades & Field Services</option>
      <option>Salons & Hospitality</option>
      <option>Real Estate</option>
      <option>Professional Services</option>
      <option>Retail & E-Commerce</option>
      <option>Health & Wellness</option>
      <option>Coaching & Consulting</option>
      <option>Other</option>
    </select>
  </div>

  <!-- PAIN POINT -->
  <div class="form-group">
    <label for="pain">Biggest problem you're trying to solve</label>
    <textarea id="pain" name="pain"></textarea>
  </div>

  <!-- TIMELINE -->
  <div class="form-group">
    <label for="timeline">Timeline</label>
    <select id="timeline" name="timeline">
      <option value="">Select timeline</option>
      <option>As soon as possible</option>
      <option>Within the next month</option>
      <option>1 to 3 months</option>
      <option>Just exploring</option>
    </select>
  </div>

  <button type="submit" class="form-submit">
    Request a Discovery Call →
  </button>

  <p id="formStatus" class="form-note"></p>
</form>
